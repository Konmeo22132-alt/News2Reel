<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', -apple-system, sans-serif; box-sizing: border-box; }
    body { background: transparent; margin: 0; padding: 20px; width: var(--card-width, 1040px); }

    .card {
      background: #16181c;
      border: 1px solid #2f3336;
      border-radius: 20px;
      padding: 28px;
      color: #e7e9ea;
      position: relative;
      box-shadow: 0 24px 80px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px; height: 2.5px;
      background: linear-gradient(90deg, var(--accent-color, #1d9bf0), var(--accent-color-dark, #0369a1), var(--accent-color, #1d9bf0));
      border-radius: 2px;
    }

    .avatar {
      width: 50px; height: 50px; border-radius: 50%;
      background: var(--avatar-gradient, linear-gradient(135deg, #1d9bf0, #0369a1));
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 900; color: white;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px #2f3336, 0 0 14px var(--accent-glow, rgba(29,155,240,0.3));
    }
    .verified-badge {
      width: 18px; height: 18px; border-radius: 50%;
      background: #1d9bf0;
      display: inline-flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .breaking-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--badge-bg, rgba(29,155,240,0.12));
      border: 1px solid var(--badge-border, rgba(29,155,240,0.45));
      color: var(--badge-color, #60b4ff);
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.09em; text-transform: uppercase;
      padding: 4px 12px; border-radius: 999px; margin-bottom: 16px;
    }
    .dot-live {
      width: 7px; height: 7px; background: var(--accent-color, #1d9bf0);
      border-radius: 50%;
      animation: livepulse 1s infinite;
      box-shadow: 0 0 5px var(--accent-color, #1d9bf0);
    }
    @keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .tweet-body { font-size: 19px; line-height: 1.6; color: #e7e9ea; margin-top: 16px; }
    .hl-accent { color: var(--accent-color, #1d9bf0); font-weight: 700; }
    .hl-gold   { color: #ffd700; font-weight: 700; }
    .hl-white  { color: #ffffff; font-weight: 700; }

    .chips-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
    .chip {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 11px; padding: 10px 14px;
      font-size: 14.5px; color: #d0d0d0; line-height: 1.4;
      display: flex; align-items: flex-start; gap: 8px;
      flex: 1; min-width: 200px;
    }
    .chip-icon { font-size: 17px; flex-shrink: 0; margin-top: 1px; }

    .source-card {
      margin-top: 14px;
      border: 1px solid var(--source-border, rgba(29,155,240,0.2));
      border-radius: 14px; overflow: hidden;
      display: flex; background: var(--source-bg, rgba(29,155,240,0.05));
    }
    .source-bar { width: 3.5px; background: linear-gradient(180deg, var(--accent-color, #1d9bf0), var(--accent-color-dark, #0369a1)); flex-shrink: 0; }
    .source-body { padding: 11px 14px; }
    .source-label { font-size: 11.5px; color: #71767b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
    .source-title { font-size: 15px; font-weight: 700; color: #e7e9ea; line-height: 1.4; }

    .stats {
      display: flex; align-items: center; gap: 2px;
      padding-top: 14px; margin-top: 14px;
      border-top: 1px solid #2f3336;
    }
    .stat {
      display: flex; align-items: center; gap: 5px;
      color: #71767b; font-size: 13px; font-weight: 500;
      padding: 5px 9px; border-radius: 999px;
    }
    .stat svg { width: 16px; height: 16px; }
    .stat-n { font-weight: 700; }
    .x-logo { position: absolute; top: 22px; right: 22px; opacity: 0.18; }
  </style>
</head>
<body>
{{CSS_VARS}}
<div class="card">

  <svg class="x-logo" width="26" height="26" viewBox="0 0 300 300" fill="white">
    <path d="M178.57 127.15 290.27 0h-26.46l-97.03 110.38L89.34 0H0l117.13 166.93L0 300.25h26.46l102.4-116.59 81.8 116.59h89.34M36.01 19.54H76.66l187.13 262.13h-40.66"/>
  </svg>

  <div class="breaking-pill"><div class="dot-live"></div>{{BADGE_TEXT}}</div>

  <div style="display:flex;align-items:center;gap:14px;">
    <div class="avatar">{{AVATAR_LETTER}}</div>
    <div style="flex:1;">
      <div style="font-size:16px;font-weight:800;color:#e7e9ea;display:flex;align-items:center;gap:5px;">
        {{DISPLAY_NAME}}
        <div class="verified-badge">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        </div>
      </div>
      <div style="font-size:13px;color:#71767b;margin-top:3px;">{{HANDLE}} · {{TIMESTAMP}}</div>
    </div>
  </div>

  <div class="tweet-body">{{TWEET_BODY}}</div>

  <div class="chips-grid">{{CHIPS_HTML}}</div>

  <!-- Context Image Injector -->
  {{CONTEXT_IMAGE_HTML}}

  <div class="stats">
    <div class="stat">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 7.879 3.77 7.879 8.051 0 4.48-3.522 8.049-7.879 8.049H7.21c-.898 0-1.447-.273-1.907-.67l-3.055 1.667a.75.75 0 01-1.097-.66V10zm8.005-6C6.22 4 3.5 6.656 3.5 10v8.442l1.862-1.017a.75.75 0 01.756.022c.431.28.747.43 1.092.43h6.892c3.397 0 6.379-2.845 6.379-6.549 0-3.63-2.914-6.551-6.379-6.551H9.756z"/></svg>
      <span class="stat-n">{{STAT_COMMENTS}}</span>
    </div>
    <div class="stat">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"/></svg>
      <span class="stat-n">{{STAT_RETWEETS}}</span>
    </div>
    <div class="stat" style="color:#f91880;">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"/></svg>
      <span class="stat-n" style="color:#f91880;">{{STAT_LIKES}}</span>
    </div>
    <div class="stat" style="margin-left:auto;">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z"/></svg>
      <span class="stat-n">{{STAT_VIEWS}}</span>
    </div>
  </div>
</div>
</body>
</html>
